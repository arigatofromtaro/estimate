<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIGATOGOZAIMASU.PRINT | 30秒お見積り</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ARIGATOGOZAIMASU.PRINT</div>
            <h1>30秒お見積り</h1>
            <p class="disclaimer">※こちらで算出される金額はあくまでも概算です。<br>詳細な金額や仕様については、お気軽にご相談ください！</p>
        </header>

        <main>
            <form id="estimateForm">
                <!-- Q1: Color Scheme -->
                <section class="card" id="qColorSection">
                    <label>Q1. プリントの配色は？</label>
                    <div class="radio-group">
                        <input type="radio" id="colorSilk" name="colorScheme" value="silk" checked>
                        <label for="colorSilk">A 1〜2色 (単色ロゴなど)</label>

                        <input type="radio" id="colorInkjet" name="colorScheme" value="inkjet">
                        <label for="colorInkjet">B 3色以上または写真 (フルカラー)</label>
                    </div>
                </section>

                <section class="card hidden" id="qFabricColorSection">
                    <label>フルカラー: 生地の色は？</label>
                    <div class="radio-group">
                        <input type="radio" id="fabricWhite" name="fabricColor" value="white" checked>
                        <label for="fabricWhite">白生地</label>

                        <input type="radio" id="fabricColor" name="fabricColor" value="color">
                        <label for="fabricColor">白以外の色 (有色生地)</label>
                    </div>
                </section>

                <section class="card hidden" id="qPrintSizeSection">
                    <label>フルカラー: プリントのサイズは？</label>
                    <div class="radio-group">
                        <input type="radio" id="size10" name="printSize" value="10" checked>
                        <label for="size10">小 (10cm角以内)</label>

                        <input type="radio" id="size20" name="printSize" value="20">
                        <label for="size20">中 (20cm角以内)</label>
                        
                        <input type="radio" id="size30" name="printSize" value="30">
                        <label for="size30">大 (A4・30cm×40cm以内)</label>
                    </div>
                </section>

                <!-- Q2: Item Selection -->
                <section class="card" id="q1Section">
                    <label for="itemType">Q2. アイテムを選んでください</label>
                    <select id="itemType" name="itemType" required>
                        <option value="" disabled selected>アイテムを選択...</option>
                        <option value="item1">①綿Tシャツ (Printstar 085CVT)</option>
                        <option value="item2">②ハイクオリティ綿Tシャツ (United Athle 5001)</option>
                        <option value="item3">③ドライTシャツ (glimmer 300ACT / United Athle 5900)</option>
                        <option value="item4">④TCポロシャツ (Printstar 100VP)</option>
                        <option value="item5">⑤ドライポロシャツ (glimmer 302ADP)</option>
                        <option value="item6">⑥ドライ長袖Tシャツ (glimmer 304ALT / United Athle 508901)</option>
                        <option value="item7">⑦綿長袖Tシャツ (Printstar 102CVL)</option>
                    </select>
                </section>

                <!-- Q3: Quantity -->
                <section class="card">
                    <label for="quantity">Q3. 作成したい正確な枚数を入力してください</label>
                    <div class="input-with-unit">
                        <input type="number" id="quantity" name="quantity" min="1" placeholder="例: 200" required>
                        <span class="unit">枚</span>
                    </div>
                </section>

                <!-- Q4: Options - Additional Print -->
                <section class="card">
                    <label>Q4. 追加プリントはありますか？</label>
                    <div class="radio-group">
                        <input type="radio" id="addNone" name="addPrint" value="none" checked>
                        <label for="addNone">追加はなし。1か所1色は無料内！</label>

                        <input type="radio" id="addBack" name="addPrint" value="back">
                        <label for="addBack">胸/背中に追加する</label>

                        <input type="radio" id="addSleeve" name="addPrint" value="sleeve">
                        <label for="addSleeve">袖に追加する</label>
                    </div>
                </section>

                <!-- Q5: Bagging -->
                <section class="card">
                    <label>Q5. 袋詰めは必要ですか？</label>
                    <div class="radio-group">
                        <input type="radio" id="bagNone" name="bag" value="none" checked>
                        <label for="bagNone">A なし</label>

                        <input type="radio" id="bagYes" name="bag" value="yes">
                        <label for="bagYes">B あり (1枚50円)</label>
                    </div>
                </section>

                <!-- Q6: Name Tag -->
                <section class="card">
                    <label>Q6. ネームタグは必要ですか？</label>
                    <div class="radio-group">
                        <input type="radio" id="tagNone" name="tag" value="none" checked>
                        <label for="tagNone">A なし</label>

                        <input type="radio" id="tagYes" name="tag" value="yes">
                        <label for="tagYes">B カスタム (+1枚400円)</label>
                    </div>
                </section>
            </form>

            <div class="result-card">
                <div class="result-header">概算合計金額</div>
                <div class="total-amount">約 <span id="totalDisplay">0</span> 円</div>
                <div class="details">
                    <p>基本単価: <span id="basicPriceDisplay">0</span> 円</p>
                    <p>追加料金: <span id="addPriceDisplay">0</span> 円</p>
                </div>
                
                <p class="disclaimer-bottom">※上記の金額はあくまでも概算です。<br>デザインの確定や正式な見積もりは、まずはご相談しましょう！</p>

                <a href="https://lin.ee/YJMYoWZ" class="line-btn">
                    <span>LINEで気軽に相談したい！</span>
                    <span>さらにお気持ちお安くします。</span>
                </a>

                <a href="https://forms.gle/mumvstnJsJLcgQUD6" class="drive-btn" target="_blank">
                    <span>デザインを入稿する</span>
                    <span>AI / PNG / PDF / PSD 対応</span>
                </a>
            </div>
        </main>
    </div>
    <script src="script.js?v=2"></script>
</body>
</html>
